<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>402: PAYMENT_REQUIRED | Vercel</title>
    <link rel="icon" href="https://vercel.com/favicon.ico">
    <style>
        :root {
            --vercel-f: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
        }
        body { 
            background: #fafafa; 
            color: #000; 
            font-family: var(--vercel-f); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            /* Zooming aur scrolling gestures disable karne ke liye */
            touch-action: none;
            -webkit-text-size-adjust: 100%;
            overflow: hidden;
        }
        .card { 
            background: #ffffff;
            max-width: 500px; 
            width: 85%;
            padding: 40px; 
            border: 1px solid #eaeaea; 
            border-radius: 8px; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.05); 
            /* Selection prevent karne ke liye (Option) */
            user-select: none;
        }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .header svg { margin-right: 12px; }
        h1 { font-size: 24px; font-weight: 600; margin: 0; letter-spacing: -0.6px; }
        p { font-size: 14px; color: #444; line-height: 1.6; margin: 20px 0; }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; border-top: 1px solid #eaeaea; padding-top: 20px; color: #666; }
        .code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-weight: 600; color: #000; }
        .status-dot { width: 8px; height: 8px; background: #f5a623; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <svg width="24" height="24" viewBox="0 0 76 65" fill="#000"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z"></path></svg>
            <h1>Deployment Paused</h1>
        </div>
        <p>
            The deployment has been manually paused by the project owner or reached its current plan limits. If you are the owner, you can resume the deployment from your <b>Vercel Dashboard</b>. No data or configuration has been lost.
        </p>
        <div class="info-row">
            <div>Status: <span class="status-dot"></span> <span style="color:#f5a623">Paused</span></div>
            <div class="code">402_REQ_PAUSE</div>
        </div>
    </div>
    <div style="margin-top: 20px; font-size: 12px; color: #888;">
        Vercel Edge Network (BOM1)
    </div>
</body>
</html>
