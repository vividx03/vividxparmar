<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivid Academy | Elite Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(15, 23, 42, 0.7);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #020617); 
            color: #f1f5f9; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* Progress Bar */
        #progress-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 5px;
            background: rgba(255,255,255,0.05);
            z-index: 10000;
        }
        #progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            box-shadow: 0 0 15px #3b82f6;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            transition: all 0.3s ease;
        }

        .btn-video { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .btn-eng { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .btn-hindi { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .btn-quiz { background: linear-gradient(135deg, #ec4899, #db2777); }
        .btn-ppt { background: linear-gradient(135deg, #06b6d4, #0891b2); }

        .modal-overlay { 
            background: rgba(2, 6, 23, 0.98); 
            z-index: 9999; 
            backdrop-filter: blur(8px); 
        }

        .full-page-notif {
            width: 100%;
            height: 100%;
            max-width: none !important;
            max-height: none !important;
            border-radius: 0 !important;
            border: none !important;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none; }

        .notif-btn {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            animation: ring 2s infinite ease-in-out;
        }
        @keyframes ring {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #notif-dot {
            min-width: 18px;
            height: 18px;
            padding: 0 4px;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            top: 6px;
            right: 6px;
            border: 2px solid #020617;
        }
    </style>
</head>
<body class="p-4 pb-28">

    <div id="progress-container"><div id="progress-bar"></div></div>

    <!-- NOTICE MODAL - COMPLETELY REMOVED -->

    <div id="inbox-modal" class="fixed inset-0 modal-overlay hidden flex items-start justify-center overflow-y-auto">
        <div class="notice-content glass-card full-page-notif flex flex-col min-h-screen">
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-blue-500/5 sticky top-0 backdrop-blur-md">
                <h3 class="font-black text-white tracking-widest uppercase text-sm"><i class="fas fa-bell mr-2 text-blue-400"></i> Notifications</h3>
                <button onclick="toggleInbox()" class="text-slate-400 text-3xl">&times;</button>
            </div>
            <div id="inbox-list" class="p-4 space-y-4"></div>
        </div>
    </div>

    <div id="redirect-overlay" class="fixed inset-0 modal-overlay hidden flex-col items-center justify-center text-center">
        <div class="loader mb-6"></div>
        <h3 class="text-blue-400 font-bold tracking-widest uppercase text-lg">Securing Connection...</h3>
    </div>

    <div id="video-modal" class="fixed inset-0 hidden modal-overlay flex items-center justify-center p-4">
        <div class="modal-content glass-card p-5 relative w-full max-w-2xl text-center shadow-2xl">
            <button onclick="closeVideo()" class="absolute -top-14 right-0 text-white text-4xl">&times;</button>
            <p id="wait-msg" class="text-[10px] mb-4 uppercase tracking-widest bg-yellow-500/10 py-2 rounded-lg text-yellow-500 font-bold">⚠️ Please wait... Lecture starts within 60s</p>
            <div id="video-player-container" class="rounded-xl overflow-hidden bg-black"></div>
            <div id="download-btn-container" class="mt-4"></div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="text-center py-12">
            <h1 class="text-4xl font-black tracking-tighter text-white">VIVID <span class="text-blue-500">ACADEMY</span></h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.4em] mt-2">Excellence in Learning</p>
        </header>

        <div id="search-container" class="mb-8 flex gap-3">
            <div class="glass-card flex-1 flex items-center px-6 py-4">
                <i class="fas fa-search text-blue-500 mr-4"></i>
                <input type="text" id="courseSearch" placeholder="Search your course..." class="bg-transparent border-none outline-none w-full text-white placeholder-slate-600 text-base font-medium" onkeyup="filterCourses()">
            </div>
            <button onclick="toggleInbox()" class="notif-btn glass-card w-14 h-14 flex items-center justify-center text-blue-500 relative">
                <i class="fas fa-bell text-xl"></i>
                <span id="notif-dot" class="hidden absolute bg-red-500 text-white rounded-full">0</span>
            </button>
        </div>

        <h2 id="view-title" class="text-xs font-black mb-6 uppercase tracking-[0.2em] text-blue-400 border-b border-blue-500/20 pb-2">AVAILABLE COURSES</h2>
        <div id="course-list" class="grid gap-4"></div>
        <div id="no-results" class="hidden text-center py-20 text-slate-500 italic">No course found.</div>

        <div id="subject-section" class="hidden grid gap-4">
            <div id="subject-list" class="grid gap-4"></div>
            <button onclick="renderCourses()" class="mt-8 p-4 glass-card w-full font-bold text-slate-400 text-sm tracking-widest uppercase">BACK TO COURSES</button>
        </div>

        <div id="category-section" class="hidden grid gap-4">
            <div id="category-list" class="grid gap-4"></div>
            <button onclick="toggle('subject-section')" class="mt-4 p-4 glass-card w-full font-bold text-slate-400 text-sm tracking-widest uppercase text-center">BACK</button>
        </div>

        <div id="content-section" class="hidden grid gap-4 text-center">
            <div id="chapter-list" class="grid gap-4"></div>
            <button onclick="toggle('category-section')" class="mt-6 p-4 glass-card w-full font-bold text-slate-400 text-sm tracking-widest uppercase mb-10 text-center">BACK</button>
        </div>

        <!-- FOOTER WITH SOCIAL ICONS - COMPLETELY REMOVED -->
    </div>

    <script>
        let mainData = null, curC = null, curS = null;
        let notifViewed = false;

        function toggleInbox() {
            const modal = document.getElementById('inbox-modal');
            const dot = document.getElementById('notif-dot');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                renderNotifications();
                dot.classList.add('hidden');
                notifViewed = true; 
                document.body.style.overflow = 'hidden'; 
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        function renderNotifications() {
            const list = document.getElementById('inbox-list');
            const msgs = mainData.notifications || [];
            list.innerHTML = msgs.length ? '' : '<p class="text-center text-slate-500 text-xs py-20">No new updates</p>';
            msgs.slice().reverse().forEach(n => {
                list.innerHTML += `
                    <div class="glass-card p-5 border-l-4 border-blue-500 bg-white/5">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-blue-400 text-[10px] font-black uppercase tracking-widest bg-blue-500/10 px-2 py-0.5 rounded">${n.tag || 'UPDATE'}</span>
                            <span class="text-slate-600 text-[9px] font-bold">${n.date || ''}</span>
                        </div>
                        <p class="text-[13px] text-slate-300 leading-relaxed font-medium">${n.message}</p>
                    </div>`;
            });
        }

        // No notice modal to close, progress bar starts at 20 for consistency
        function autoProgress() { 
            updateProgress(20); 
        }
        
        function updateProgress(percent) { 
            const bar = document.getElementById('progress-bar');
            if(bar) bar.style.width = percent + '%'; 
        }

        function safeRedirect(url) {
            const loader = document.getElementById('redirect-overlay');
            loader.classList.remove('hidden');
            setTimeout(() => { window.open(url, '_blank'); loader.classList.add('hidden'); }, 800);
        }

        function handleOpen(content) {
            if (!content) return;
            if (content.includes('<') && content.includes('>')) {
                const newWindow = window.open('', '_blank');
                newWindow.document.write(content);
                newWindow.document.close();
            } else {
                safeRedirect(content);
            }
        }

        function loadData() { 
            fetch('db.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => { 
                mainData = data; 
                renderCourses();
                if(!notifViewed && data.notifications && data.notifications.length > 0) {
                    const dot = document.getElementById('notif-dot');
                    dot.innerText = data.notifications.length;
                    dot.classList.remove('hidden');
                }
                // Call auto progress after data loads
                autoProgress();
            })
            .catch(err => {
                console.error("Failed to load db.json", err);
                // Fallback to avoid breaking UI if no data
                mainData = { courses: [], notifications: [] };
                renderCourses();
                autoProgress();
            }); 
        }
        
        function renderCourses() { 
            updateProgress(30);
            document.getElementById('view-title').innerText = "AVAILABLE COURSES"; 
            document.getElementById('search-container').classList.remove('hidden');
            const list = document.getElementById('course-list'); 
            if(!list) return;
            list.innerHTML = ''; 
            if(!mainData || !mainData.courses || mainData.courses.length === 0) {
                list.innerHTML = '<div class="glass-card p-6 text-center text-slate-400">No courses available</div>';
                return;
            }
            mainData.courses.forEach((c, i) => { 
                let action = c.directLink ? `handleOpen('${c.directLink}')` : `selectCourse(${i})`;
                list.innerHTML += `<div onclick="${action}" class="glass-card p-6 flex items-center cursor-pointer active:scale-95 transition-all duration-200">
                    <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center mr-5 border border-blue-500/20"><i class="fas fa-graduation-cap text-blue-500 text-xl"></i></div>
                    <div><div class="font-bold text-base text-white">${escapeHtml(c.name)}</div><div class="text-slate-500 text-[10px] font-black uppercase mt-1 tracking-widest">${c.teacher ? escapeHtml(c.teacher) : 'Vivid Faculty'}</div></div>
                    <i class="fas fa-chevron-right ml-auto text-slate-700 text-sm"></i>
                </div>`; 
            }); 
            toggle('course-list'); 
        }
        
        // Basic escape to prevent injection
        function escapeHtml(str) { 
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function filterCourses() {
            let input = document.getElementById('courseSearch').value.toUpperCase();
            let items = document.getElementById('course-list').children;
            let found = false;
            for (let i = 0; i < items.length; i++) {
                if (items[i].innerText.toUpperCase().includes(input)) { items[i].style.display = ""; found = true; }
                else items[i].style.display = "none";
            }
            const noRes = document.getElementById('no-results');
            if(noRes) noRes.classList.toggle('hidden', found);
        }

        function selectCourse(i) { 
            if(!mainData || !mainData.courses[i]) return;
            curC = i; updateProgress(50);
            document.getElementById('search-container').classList.add('hidden');
            document.getElementById('view-title').innerHTML = escapeHtml(mainData.courses[i].name);
            const list = document.getElementById('subject-list'); 
            if(!list) return;
            list.innerHTML = ''; 
            if(!mainData.courses[i].subjects || mainData.courses[i].subjects.length === 0) {
                list.innerHTML = '<div class="glass-card p-6 text-center text-slate-400">No subjects available</div>';
                toggle('subject-section');
                return;
            }
            mainData.courses[i].subjects.forEach((s, si) => { 
                list.innerHTML += `<div onclick="showCategories(${si})" class="glass-card p-6 flex justify-between items-center cursor-pointer active:scale-95 transition-all"><span class="font-bold text-sm uppercase text-slate-200">${escapeHtml(s.name)}</span><i class="fas fa-arrow-right text-blue-500"></i></div>`; 
            }); 
            toggle('subject-section'); 
        }

        function showCategories(si) { 
            if(!mainData || !mainData.courses[curC] || !mainData.courses[curC].subjects[si]) return;
            curS = si; updateProgress(75);
            document.getElementById('view-title').innerHTML = escapeHtml(mainData.courses[curC].subjects[si].name);
            const catList = document.getElementById('category-list');
            if(catList) {
                catList.innerHTML = `
                    <div onclick="showItems('CHAPTERS')" class="glass-card p-8 border-l-4 border-blue-600 cursor-pointer flex items-center active:scale-95 transition-all"><i class="fas fa-book-open mr-5 text-blue-500 text-xl"></i> <span class="font-black text-sm uppercase text-white tracking-widest">CHAPTERS CONTENT</span></div>
                    <div onclick="showItems('WEEKLY TESTS')" class="glass-card p-8 border-l-4 border-pink-600 cursor-pointer flex items-center active:scale-95 transition-all"><i class="fas fa-vial mr-5 text-pink-500 text-xl"></i> <span class="font-black text-sm uppercase text-white tracking-widest">MOCK TESTS</span></div>`;
            }
            toggle('category-section'); 
        }

        function showItems(type) { 
            if(!mainData || !mainData.courses[curC] || !mainData.courses[curC].subjects[curS]) return;
            const items = mainData.courses[curC].subjects[curS][type] || []; 
            updateProgress(100);
            document.getElementById('view-title').innerHTML = type;
            const list = document.getElementById('chapter-list'); 
            if(!list) return;
            list.innerHTML = ''; 
            if(items.length === 0) {
                list.innerHTML = '<div class="glass-card p-6 text-center text-slate-400">No content available in this section.</div>';
                toggle('content-section');
                return;
            }
            items.forEach((ch, idx) => { 
                // Safely decode btoa
                const getUrl = (url) => url ? atob(url) : null;
                list.innerHTML += `<div class="glass-card p-6 mb-4 text-left">
                    <h4 class="font-bold mb-5 text-white text-sm uppercase border-b border-slate-800 pb-4 leading-relaxed tracking-wide">${escapeHtml(ch.title)}</h4>
                    <div class="grid grid-cols-2 gap-3 text-[10px] font-black uppercase text-white">
                        ${ch.url ? `<button onclick="handleOpen(atob('${btoa(ch.url)}'))" class="btn-video py-4 rounded-xl hover:scale-105 transition-transform">VIDEO</button>` : ''}
                        ${ch.notes_en ? `<button onclick="handleOpen(atob('${btoa(ch.notes_en)}'))" class="btn-eng py-4 rounded-xl hover:scale-105 transition-transform">ENG NOTES</button>` : ''}
                        ${ch.notes_hi ? `<button onclick="handleOpen(atob('${btoa(ch.notes_hi)}'))" class="btn-hindi py-4 rounded-xl hover:scale-105 transition-transform">HINDI NOTES</button>` : ''}
                        ${ch.quiz ? `<button onclick="handleOpen(atob('${btoa(ch.quiz)}'))" class="btn-quiz py-4 rounded-xl hover:scale-105 transition-transform">QUIZ</button>` : ''}
                        ${ch.handwritten ? `<button onclick="handleOpen(atob('${btoa(ch.handwritten)}'))" class="btn-ppt py-4 rounded-xl hover:scale-105 transition-transform">PPT/PDF</button>` : ''}
                    </div>
                </div>`; 
            }); 
            toggle('content-section'); 
        }

        function closeVideo() { 
            const container = document.getElementById('video-player-container');
            if(container) container.innerHTML = ''; 
            const modal = document.getElementById('video-modal');
            if(modal) modal.classList.add('hidden'); 
        }

        function toggle(id) { 
            const sections = ['course-list', 'subject-section', 'category-section', 'content-section'];
            sections.forEach(d => {
                const el = document.getElementById(d);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden'); 
            window.scrollTo({top: 0, behavior: 'smooth'}); 
        }

        // Remove any leftover notice modal from DOM if exists
        function removeNoticeIfPresent() {
            const noticeModal = document.getElementById('notice-modal');
            if(noticeModal) noticeModal.remove();
        }
        
        // Initialize on load, no popup
        window.addEventListener('DOMContentLoaded', () => {
            removeNoticeIfPresent();
            loadData();
            // Ensure progress bar starts at 0 then auto updated to 20 after data loads
            updateProgress(0);
        });
    </script>
</body>
</html>
