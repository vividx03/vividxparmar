<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivid Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4" onload="loadData()">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold text-center text-blue-400 my-6">VIVID ACADEMY</h1>
        
        <div id="search-container" class="mb-6">
            <input type="text" id="courseSearch" onkeyup="filterCourses()" placeholder="Search Course or Teacher..." 
                class="w-full p-3 glass-card bg-transparent outline-none text-sm">
        </div>

        <div id="course-list" class="grid gap-4"></div>
        <div id="subject-section" class="hidden grid gap-4">
            <div id="subject-list" class="grid gap-4"></div>
            <button onclick="location.reload()" class="mt-4 p-4 glass-card w-full">BACK TO HOME</button>
        </div>
    </div>

    <script>
        let mainData = null;
        function loadData() { 
            fetch('db.json?v=' + Date.now()).then(res => res.json()).then(data => { 
                mainData = data; renderCourses(); 
            }); 
        }
        function renderCourses() {
            const list = document.getElementById('course-list'); list.innerHTML = '';
            mainData.courses.forEach((c, i) => {
                list.innerHTML += `<div onclick="selectCourse(${i})" class="glass-card p-6 text-center cursor-pointer course-item">
                    <div class="font-bold text-lg">${c.name}</div>
                    <div class="text-blue-300/60 text-xs mt-1 italic">${c.teacher}</div>
                </div>`;
            });
        }
        function filterCourses() {
            let input = document.getElementById('courseSearch').value.toUpperCase();
            let items = document.getElementsByClassName('course-item');
            for (let i = 0; i < items.length; i++) {
                items[i].style.display = items[i].innerText.toUpperCase().includes(input) ? "" : "none";
            }
        }
        function selectCourse(i) {
            document.getElementById('course-list').classList.add('hidden');
            document.getElementById('search-container').classList.add('hidden');
            const list = document.getElementById('subject-list'); list.innerHTML = '';
            mainData.courses[i].subjects.forEach(s => {
                list.innerHTML += `<div class="glass-card p-4">${s.name}</div>`;
            });
            document.getElementById('subject-section').classList.remove('hidden');
        }
    </script>
</body>
</html>
