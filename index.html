<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivid Academy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; transition: all 0.3s ease; }
        .search-box { background: rgba(255, 255, 255, 0.1); border: 1px solid #3b82f6; border-radius: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 pb-24">
    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-blue-400">VIVID ACADEMY</h1>
        </header>

        <div id="search-container" class="mb-6">
            <div class="search-box flex items-center px-4 py-3">
                <i class="fas fa-search text-blue-400 mr-3"></i>
                <input type="text" id="courseSearch" placeholder="Search course or teacher..." 
                    class="bg-transparent border-none outline-none w-full text-white placeholder-gray-400 text-sm"
                    onkeyup="filterCourses()">
            </div>
        </div>

        <h2 id="view-title" class="text-xl font-semibold mb-6 text-center text-blue-200">COURSES</h2>

        <div id="course-list" class="grid gap-4"></div>
        <div id="no-results" class="hidden text-center py-10 text-gray-500 italic">No course found.</div>

        <div id="subject-section" class="hidden grid gap-4">
            <div id="subject-list" class="grid gap-4"></div>
            <button onclick="renderCourses()" class="mt-6 p-4 glass-card w-full font-bold text-gray-400">BACK TO HOME</button>
        </div>
        <div id="category-section" class="hidden grid gap-4">
            <div id="category-list" class="grid gap-4"></div>
            <button onclick="toggle('subject-section')" class="mt-4 p-4 glass-card w-full font-bold text-gray-400">BACK</button>
        </div>
        <div id="content-section" class="hidden grid gap-4">
            <div id="chapter-list" class="grid gap-4"></div>
            <button onclick="toggle('category-section')" class="mt-4 p-4 glass-card w-full font-bold text-gray-400">BACK</button>
        </div>

        <footer class="fixed bottom-0 left-0 w-full p-4 bg-[#0f172a] border-t border-gray-800">
            <div class="flex justify-around max-w-md mx-auto">
                <a href="https://whatsapp.com/channel/0029VbBjUBM0wajzBk92iw2q" class="text-green-500 text-2xl"><i class="fab fa-whatsapp"></i></a>
                <a href="https://t.me/vividx_03" class="text-blue-400 text-2xl"><i class="fab fa-telegram-plane"></i></a>
            </div>
        </footer>
    </div>

    <script>
        let mainData = null;
        function loadData() { fetch('db.json?v=' + Date.now()).then(res => res.json()).then(data => { mainData = data; renderCourses(); }); }
        
        function renderCourses() {
            document.getElementById('search-container').classList.remove('hidden');
            const list = document.getElementById('course-list');
            list.innerHTML = '';
            mainData.courses.forEach((c, i) => {
                list.innerHTML += `<div onclick="selectCourse(${i})" class="glass-card p-6 text-center cursor-pointer course-item">
                    <i class="fas fa-graduation-cap text-blue-400 text-2xl mb-2"></i>
                    <div class="font-bold text-lg">${c.name}</div>
                    <div class="teacher-name text-blue-300/60 text-xs uppercase mt-1 italic">${c.teacher || 'VIVID ACADEMY'}</div>
                </div>`;
            });
            toggle('course-list');
        }

        function filterCourses() {
            let input = document.getElementById('courseSearch').value.toUpperCase();
            let items = document.getElementsByClassName('course-item');
            let found = false;
            for (let i = 0; i < items.length; i++) {
                let name = items[i].querySelector('.font-bold').innerText;
                let teacher = items[i].querySelector('.teacher-name').innerText;
                if (name.toUpperCase().includes(input) || teacher.toUpperCase().includes(input)) {
                    items[i].style.display = ""; found = true;
                } else items[i].style.display = "none";
            }
            document.getElementById('no-results').classList.toggle('hidden', found);
        }

        function selectCourse(i) {
            document.getElementById('search-container').classList.add('hidden');
            const list = document.getElementById('subject-list'); list.innerHTML = '';
            if(!mainData.courses[i].subjects.length) list.innerHTML = '<p class="text-center text-gray-500">No subjects added yet.</p>';
            mainData.courses[i].subjects.forEach((s, si) => {
                list.innerHTML += `<div onclick="alert('Content loading...')" class="glass-card p-5 flex justify-between items-center cursor-pointer">
                    <span class="font-semibold">${s.name}</span><i class="fas fa-chevron-right text-blue-500"></i>
                </div>`;
            });
            toggle('subject-section');
        }

        function toggle(id) {
            ['course-list', 'subject-section', 'category-section', 'content-section'].forEach(d => document.getElementById(d).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        loadData();
    </script>
</body>
</html>
